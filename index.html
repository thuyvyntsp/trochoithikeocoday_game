<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi kéo co dây - Pơlong dui tơlei</title>
    <style>
        :root {
            --primary-color: #f1c40f;
            --secondary-color: #e67e22;
            --bg-overlay: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            background-color: #333;
        }

        /* NỀN TRÒ CHƠI */
        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #setup-screen { display: flex; }

        .container {
            background: var(--bg-overlay);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            z-index: 2;
        }

        .setting-group { margin: 12px 0; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        select, input, textarea {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1px solid #ccc; box-sizing: border-box; font-size: 16px;
        }

        .btn {
            padding: 12px 25px; font-size: 18px; border: none;
            border-radius: 50px; cursor: pointer; transition: 0.2s;
            font-weight: bold; margin: 5px;
        }
        .btn-start { background: #2ecc71; color: white; width: 100%; margin-top: 15px; }
        .btn-rules { background: #3498db; color: white; }

        /* KHU VỰC CÂU HỎI */
        .question-box {
            background: var(--bg-overlay);
            padding: 20px; border-radius: 15px;
            width: 85%; max-width: 700px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center; z-index: 10; margin-top: 20px;
        }

        /* FIX LỖI ẢNH NHÂN VẬT BỊ MỜ */
        .rope-area {
            position: relative;
            width: 100%; flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            z-index: 5; /* Đảm bảo nằm dưới question-box nhưng trên nền */
        }

        .tug-container {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 1000px;
            opacity: 1 !important; /* Đảm bảo không bị mờ */
            filter: none !important;
        }

        .team-img { 
            height: 280px; 
            width: auto; 
            opacity: 1 !important; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); /* Giúp nhân vật nổi bật hơn */
        }

        .center-mark {
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
            background: rgba(255, 255, 0, 0.6); border-left: 2px dashed red;
            transform: translateX(-50%); z-index: 4;
        }

        #timer-display {
            font-size: 35px; font-weight: bold; color: #e74c3c;
            background: white; padding: 5px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-top: 10px;
        }

        .explanation {
            margin-top: 10px; padding: 10px; border-radius: 8px;
            background: #fff3cd; color: #856404; display: none; font-weight: bold;
        }

        /* ĐẾM NGƯỢC */
        #countdown-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: none; align-items: center; justify-content: center;
            font-size: 150px; font-weight: bold; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="countdown-overlay">3</div>

    <!-- ÂM THANH -->
    <audio id="bg-music" src="audio.mp3" loop></audio>
    <audio id="sound-correct" src="dung.mp3"></audio>
    <audio id="sound-wrong" src="sai.mp3"></audio>

    <!-- MÀN HÌNH CÀI ĐẶT -->
    <div id="setup-screen" class="screen">
        <div class="container">
            <h1 style="color: var(--secondary-color);">PƠLONG DUI TƠLEI</h1>
            
            <div class="setting-group">
                <label>Thời gian mỗi câu (giây):</label>
                <input type="number" id="time-per-question" value="15">
            </div>

            <div class="setting-group">
                <label>Chọn Lớp:</label>
                <select id="grade-select" onchange="updateTopics()">
                    <option value="1">Lớp 1</option>
                    <option value="2">Lớp 2</option>
                    <option value="3">Lớp 3</option>
                    <option value="4">Lớp 4</option>
                    <option value="5">Lớp 5</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Chọn Chủ đề:</label>
                <select id="topic-select"></select>
            </div>

            <div class="setting-group">
                <label>Chế độ chơi:</label>
                <select id="play-mode">
                    <option value="2p">2 Người chơi</option>
                    <option value="1p">Đấu với Máy</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Nguồn câu hỏi:</label>
                <select id="q-source" onchange="toggleQSource()">
                    <option value="ai">AI Tự tạo câu hỏi</option>
                    <option value="manual">Tự nhập tay</option>
                </select>
            </div>

            <div id="manual-settings" style="display:none;">
                <textarea id="manual-data" rows="3" placeholder="Câu hỏi|Đáp án"></textarea>
            </div>

            <button class="btn btn-rules" onclick="showRules()">LUẬT CHƠI</button>
            <button class="btn btn-start" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>
    </div>

    <!-- MÀN HÌNH CHƠI -->
    <div id="game-screen" class="screen">
        <div id="timer-display">15</div>
        
        <div class="question-box">
            <div id="turn-display" style="font-weight: bold; color: var(--secondary-color);">Lượt của: Đội A</div>
            <h2 id="question-text">Đang tải...</h2>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="answer-input" placeholder="Kết quả..." style="width: 150px;" onkeyup="if(event.key==='Enter') submitAnswer()">
                <button class="btn btn-rules" onclick="submitAnswer()">GỬI</button>
            </div>
            <div id="explanation-text" class="explanation"></div>
        </div>

        <div class="rope-area">
            <div class="center-mark"></div>
            <div class="tug-container" id="tug-group">
                <img src="team.png" alt="Teams" class="team-img">
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="screen" style="background: rgba(0,0,0,0.9);">
        <h1 id="winner-display" style="font-size: 50px; color: gold;">ĐỘI A THẮNG!</h1>
        <div class="container" style="max-width: 400px;">
            <p>Hình phạt: <span id="penalty-text" style="color: red; font-weight: bold;">...</span></p>
            <button class="btn btn-start" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU CHỦ ĐỀ ---
        const topicsData = {
            "1": ["Số đến 100", "Phép cộng/trừ (không nhớ)", "Hình học cơ bản", "Đo lường (cm)"],
            "2": ["Cộng/trừ có nhớ", "Bảng nhân/chia 2 và 5", "Xem giờ", "Đơn vị đo", "Hình học & Chu vi"],
            "3": ["Số đến 100.000", "Nhân/chia đa chữ số", "Bảng nhân/chia 3-9", "Góc & Chu vi/Diện tích", "Phép chia có dư"],
            "4": ["Số tự nhiên lớn", "Dấu hiệu chia hết", "Phân số", "Góc nhọn/tù/bẹt", "Diện tích hình thoi/bình hành", "Trung bình cộng"],
            "5": ["Số thập phân & Hỗn số", "Tỉ số phần trăm", "Vận tốc/Quãng đường/Thời gian", "Hình học không gian", "Giải toán chuyển động", "Lãi suất"]
        };

        function updateTopics() {
            const grade = document.getElementById('grade-select').value;
            const topicSelect = document.getElementById('topic-select');
            topicSelect.innerHTML = "";
            topicsData[grade].forEach(t => {
                let opt = document.createElement('option');
                opt.value = t; opt.innerHTML = t;
                topicSelect.appendChild(opt);
            });
        }

        // --- AI GENERATE QUESTIONS ---
        function generateAIQuestions(grade, topic, count) {
            let qSet = [];
            for (let i = 0; i < count; i++) {
                let q, a, e;
                if (grade == "1") {
                    if (topic.includes("Số")) { q = `Số đứng trước số ${Math.floor(Math.random()*90)+10} là?`; a = parseInt(q.match(/\d+/))-1; e = "Số đứng trước là số trừ đi 1."; }
                    else { let n1 = Math.floor(Math.random()*50); let n2 = Math.floor(Math.random()*40); q = `${n1} + ${n2} = ?`; a = n1+n2; e = "Cộng đơn vị theo hàng."; }
                } else if (grade == "2") {
                    if (topic.includes("nhân")) { let n1 = [2,5][Math.floor(Math.random()*2)]; let n2 = Math.floor(Math.random()*9)+1; q = `${n1} x ${n2} = ?`; a = n1*n2; e = `Bảng nhân ${n1}.`; }
                    else { q = `Cộng có nhớ: 28 + 35 = ?`; a = 63; e = "8+5=13 viết 3 nhớ 1."; }
                } else if (grade == "3") {
                    let n1 = Math.floor(Math.random()*100); let n2 = Math.floor(Math.random()*8)+2; q = `${n1} x ${n2} = ?`; a = n1*n2; e = "Nhân từ phải qua trái.";
                } else if (grade == "4") {
                    if (topic.includes("chia hết")) { let n = [120, 135, 246, 555][Math.floor(Math.random()*4)]; q = `Số ${n} có chia hết cho 5 không? (Có/Không)`; a = (n%5==0?"Có":"Không"); e = "Số tận cùng là 0 hoặc 5 thì chia hết cho 5."; }
                    else { q = "Trung bình cộng của 20 và 40 là?"; a = 30; e = "(20 + 40) chia 2 = 30."; }
                } else {
                    if (topic.includes("Vận tốc")) { q = "Quãng đường 100km, thời gian 2h. Vận tốc là? (km/h)"; a = 50; e = "Vận tốc = Quãng đường : Thời gian."; }
                    else { q = "0.5 x 10 = ?"; a = 5; e = "Dời dấu phẩy sang phải 1 chữ số."; }
                }
                qSet.push({ q, a: a.toString(), e });
            }
            return qSet;
        }

        // --- LOGIC GAME ---
        let questions = [];
        let currentQIndex = 0;
        let pullScore = 0; 
        let timer;
        let timeLeft;
        let currentTurn = 'A';
        let gameActive = false;

        function startGame() {
            const grade = document.getElementById('grade-select').value;
            const topic = document.getElementById('topic-select').value;
            const source = document.getElementById('q-source').value;

            if (source === 'ai') {
                questions = generateAIQuestions(grade, topic, 10);
            } else {
                const text = document.getElementById('manual-data').value;
                if (!text.trim()) { alert("Hãy nhập câu hỏi!"); return; }
                questions = text.split('\n').map(l => ({ q: l.split('|')[0], a: l.split('|')[1], e: "Đáp án là: " + l.split('|')[1] }));
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('bg-music').play();

            // Đếm ngược
            let cdOverlay = document.getElementById('countdown-overlay');
            let counts = ["3", "2", "1", "BẮT ĐẦU!"];
            let i = 0;
            cdOverlay.style.display = 'flex';
            cdOverlay.innerText = counts[0];
            let cdInterval = setInterval(() => {
                i++;
                if (i < counts.length) cdOverlay.innerText = counts[i];
                else { clearInterval(cdInterval); cdOverlay.style.display = 'none'; gameActive = true; nextQuestion(); }
            }, 1000);
        }

        function nextQuestion() {
            if (currentQIndex >= questions.length || Math.abs(pullScore) >= 5) { endGame(); return; }
            document.getElementById('explanation-text').style.display = 'none';
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('question-text').innerText = questions[currentQIndex].q;
            document.getElementById('turn-display').innerText = `Lượt: Đội ${currentTurn}`;
            
            timeLeft = parseInt(document.getElementById('time-per-question').value);
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            document.getElementById('timer-display').innerText = timeLeft;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); handleWrong(); }
            }, 1000);
        }

        function submitAnswer() {
            if (!gameActive) return;
            const userAns = document.getElementById('answer-input').value.trim();
            if (!userAns) { alert("Bạn chưa nhập đáp án!"); return; }

            if (userAns.toLowerCase() === questions[currentQIndex].a.toLowerCase()) handleCorrect();
            else handleWrong();
        }

        function handleCorrect() {
            gameActive = false; clearInterval(timer);
            playEffect('correct');
            if (currentTurn === 'A') pullScore--; else pullScore++;
            updateTugUI();
            setTimeout(() => { currentQIndex++; currentTurn = currentTurn === 'A'?'B':'A'; gameActive = true; nextQuestion(); }, 1200);
        }

        function handleWrong() {
            gameActive = false; clearInterval(timer);
            playEffect('wrong');
            const exp = document.getElementById('explanation-text');
            exp.innerHTML = `SAI RỒI! Đáp án: ${questions[currentQIndex].a}<br>${questions[currentQIndex].e}`;
            exp.style.display = 'block';
            setTimeout(() => { currentQIndex++; currentTurn = currentTurn === 'A'?'B':'A'; gameActive = true; nextQuestion(); }, 3000);
        }

        function updateTugUI() {
            document.getElementById('tug-group').style.transform = `translateX(${-pullScore * 60}px)`;
        }

        function playEffect(type) {
            const s = document.getElementById(type === 'correct' ? 'sound-correct' : 'sound-wrong');
            s.currentTime = 0; s.play();
        }

        function endGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-display').innerText = pullScore < 0 ? "ĐỘI A THẮNG!" : "ĐỘI B THẮNG!";
        }

        function toggleQSource() {
            document.getElementById('manual-settings').style.display = document.getElementById('q-source').value === 'manual' ? 'block' : 'none';
        }

        // Khởi tạo chủ đề lớp 1 khi load
        window.onload = updateTopics;
    </script>
</body>
</html>
