<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi kéo co dây - Pơlong dui tơlei (Pro Version)</title>
    <style>
        :root {
            --primary-color: #f1c40f;
            --secondary-color: #e67e22;
            --team-a-color: #3498db;
            --team-b-color: #e74c3c;
            --bg-overlay: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
            background-color: #333;
        }

        .screen {
            position: absolute; width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background-image: url('bg.png'); background-size: cover; background-position: center;
        }

        #setup-screen { display: flex; }

        .container {
            background: var(--bg-overlay); padding: 25px 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 550px; width: 90%;
            text-align: center; z-index: 2;
        }

        .setting-group { margin: 10px 0; text-align: left; }
        select, input, textarea {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px;
        }

        .btn {
            padding: 12px 25px; font-size: 18px; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.2s; font-weight: bold; margin: 5px;
        }
        .btn-start { background: #2ecc71; color: white; }
        .btn-history { background: #9b59b6; color: white; }
        
        /* BUZZ IN BUTTONS */
        .buzz-area { display: flex; gap: 20px; margin: 15px 0; justify-content: center; }
        .btn-buzz {
            width: 180px; height: 80px; font-size: 20px; border-radius: 15px;
            color: white; text-transform: uppercase; border: 4px solid rgba(255,255,255,0.3);
        }
        .buzz-a { background: var(--team-a-color); box-shadow: 0 6px #2980b9; }
        .buzz-b { background: var(--team-b-color); box-shadow: 0 6px #c0392b; }
        .btn-buzz:active { transform: translateY(4px); box-shadow: 0 2px #2980b9; }
        .btn-buzz:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; opacity: 0.6; }
        .highlight-buzz { border: 5px solid yellow !important; transform: scale(1.1); }

        /* STATISTICS */
        .stats-bar {
            position: absolute; top: 10px; width: 95%; display: flex;
            justify-content: space-between; pointer-events: none;
        }
        .stat-card {
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: bold;
        }

        /* GAME ELEMENTS */
        .question-box {
            background: var(--bg-overlay); padding: 20px; border-radius: 15px;
            width: 85%; max-width: 700px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center; z-index: 10;
        }
        .rope-area { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .tug-container { position: relative; display: flex; align-items: center; justify-content: center; transition: 0.6s; width: 1000px; }
        .team-img { height: 260px; width: auto; }
        .center-mark { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: red; z-index: 4; }

        /* MODAL HISTORY */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px;
            max-height: 80vh; overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH CÀI ĐẶT -->
    <div id="setup-screen" class="screen">
        <div class="container">
            <h1 style="color: var(--secondary-color);">PƠLONG DUI TƠLEI</h1>
            
            <div class="setting-group">
                <label>Chọn Lớp & Chủ đề:</label>
                <select id="grade-select" onchange="updateTopics()">
                    <option value="1">Lớp 1</option><option value="2">Lớp 2</option>
                    <option value="3">Lớp 3</option><option value="4">Lớp 4</option><option value="5">Lớp 5</option>
                </select>
                <select id="topic-select" style="margin-top:5px;"></select>
            </div>

            <div class="setting-group">
                <label>Thời gian mỗi câu (giây):</label>
                <input type="number" id="time-per-question" value="15">
            </div>

            <button class="btn btn-start" style="width:100%" onclick="startGame()">BẮT ĐẦU CHƠI</button>
            <button class="btn btn-history" style="width:100%" onclick="showHistory()">XEM KẾT QUẢ LỚP HỌC</button>
        </div>
    </div>

    <!-- MÀN HÌNH CHƠI -->
    <div id="game-screen" class="screen">
        <div class="stats-bar">
            <div class="stat-card" style="color: var(--team-a-color);">
                Đội A: <span id="stat-a-correct">0</span> Đúng | <span id="stat-a-wrong">0</span> Sai
            </div>
            <div id="timer-display" style="font-size: 30px; font-weight: bold; background: white; padding: 5px 20px; border-radius: 20px;">15</div>
            <div class="stat-card" style="color: var(--team-b-color);">
                Đội B: <span id="stat-b-correct">0</span> Đúng | <span id="stat-b-wrong">0</span> Sai
            </div>
        </div>
        
        <div class="question-box">
            <h2 id="question-text">Câu hỏi sẽ hiện ở đây</h2>
            
            <!-- BUZZ AREA -->
            <div class="buzz-area" id="buzz-area">
                <button id="btn-buzz-a" class="btn-buzz buzz-a" onclick="buzzIn('A')">Đội A Giành Quyền</button>
                <button id="btn-buzz-b" class="btn-buzz buzz-b" onclick="buzzIn('B')">Đội B Giành Quyền</button>
            </div>

            <div id="answer-section" style="display: none; gap: 10px; justify-content: center; flex-direction: column;">
                <div id="answering-display" style="font-weight:bold; font-size: 20px; color: red;"></div>
                <div>
                    <input type="text" id="answer-input" placeholder="Nhập đáp án..." style="width: 200px;">
                    <button class="btn btn-rules" style="background:#27ae60; color:white;" onclick="submitAnswer()">GỬI</button>
                </div>
            </div>
            <div id="explanation-text" style="display:none; color: #856404; background: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px;"></div>
        </div>

        <div class="rope-area">
            <div class="center-mark"></div>
            <div class="tug-container" id="tug-group">
                <img src="team.png" alt="Teams" class="team-img">
            </div>
        </div>
    </div>

    <!-- MODAL LỊCH SỬ -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h2>Lịch Sử Kết Quả Lớp Học</h2>
            <div id="history-table-container"></div>
            <button class="btn btn-start" onclick="closeHistory()">ĐÓNG</button>
            <button class="btn" style="background: #e74c3c; color: white;" onclick="clearHistory()">XÓA TẤT CẢ</button>
        </div>
    </div>

    <audio id="sound-correct" src="dung.mp3"></audio>
    <audio id="sound-wrong" src="sai.mp3"></audio>

    <script>
        const topicsData = {
            "1": ["Số đến 100", "Cộng/Trừ phạm vi 100"],
            "2": ["Nhân/Chia 2 & 5", "Chu vi tam giác"],
            "3": ["Bảng nhân 3-9", "Diện tích hình vuông"],
            "4": ["Phân số", "Trung bình cộng"],
            "5": ["Số thập phân", "Hình học không gian"]
        };

        let stats = { A: { correct: 0, wrong: 0 }, B: { correct: 0, wrong: 0 } };
        let questions = [];
        let currentQIndex = 0;
        let pullScore = 0;
        let timer;
        let timeLeft;
        let gameActive = false;
        let answeringTeam = null;

        function updateTopics() {
            const grade = document.getElementById('grade-select').value;
            const topicSelect = document.getElementById('topic-select');
            topicSelect.innerHTML = "";
            topicsData[grade].forEach(t => {
                let opt = document.createElement('option');
                opt.value = t; opt.innerHTML = t;
                topicSelect.appendChild(opt);
            });
        }

        function startGame() {
            stats = { A: { correct: 0, wrong: 0 }, B: { correct: 0, wrong: 0 } };
            updateStatsUI();
            currentQIndex = 0;
            pullScore = 0;
            updateTugUI();
            
            // Generate dummy AI questions
            questions = [];
            for(let i=0; i<10; i++) {
                let n1 = Math.floor(Math.random()*20);
                let n2 = Math.floor(Math.random()*20);
                questions.push({ q: `${n1} + ${n2} = ?`, a: (n1+n2).toString() });
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            gameActive = true;
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQIndex >= questions.length || Math.abs(pullScore) >= 5) {
                endGame(); return;
            }

            answeringTeam = null;
            document.getElementById('buzz-area').style.display = 'flex';
            document.getElementById('answer-section').style.display = 'none';
            document.getElementById('btn-buzz-a').disabled = false;
            document.getElementById('btn-buzz-b').disabled = false;
            document.getElementById('btn-buzz-a').classList.remove('highlight-buzz');
            document.getElementById('btn-buzz-b').classList.remove('highlight-buzz');
            document.getElementById('explanation-text').style.display = 'none';
            document.getElementById('answer-input').value = '';

            document.getElementById('question-text').innerText = `Câu ${currentQIndex + 1}: ${questions[currentQIndex].q}`;
            
            timeLeft = parseInt(document.getElementById('time-per-question').value);
            document.getElementById('timer-display').innerText = timeLeft;
            
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); handleWrong(); }
            }, 1000);
        }

        function buzzIn(team) {
            if (!gameActive || answeringTeam) return;
            answeringTeam = team;
            
            // UI Highlight
            document.getElementById('btn-buzz-' + team.toLowerCase()).classList.add('highlight-buzz');
            document.getElementById('btn-buzz-a').disabled = true;
            document.getElementById('btn-buzz-b').disabled = true;
            
            // Show Input
            document.getElementById('buzz-area').style.display = 'none';
            document.getElementById('answer-section').style.display = 'flex';
            document.getElementById('answering-display').innerText = `ĐỘI ${team} ĐANG TRẢ LỜI...`;
            document.getElementById('answer-input').focus();
        }

        function submitAnswer() {
            if (!answeringTeam) return;
            const userAns = document.getElementById('answer-input').value.trim();
            if (!userAns) return;

            if (userAns.toLowerCase() === questions[currentQIndex].a.toLowerCase()) {
                handleCorrect();
            } else {
                handleWrong();
            }
        }

        function handleCorrect() {
            clearInterval(timer);
            playEffect('correct');
            stats[answeringTeam].correct++;
            
            if (answeringTeam === 'A') pullScore--; else pullScore++;
            updateTugUI();
            updateStatsUI();

            setTimeout(() => { currentQIndex++; nextQuestion(); }, 1200);
        }

        function handleWrong() {
            clearInterval(timer);
            playEffect('wrong');
            if (answeringTeam) stats[answeringTeam].wrong++;

            const exp = document.getElementById('explanation-text');
            exp.innerHTML = `SAI RỒI! Đáp án là: ${questions[currentQIndex].a}`;
            exp.style.display = 'block';

            updateStatsUI();
            setTimeout(() => { currentQIndex++; nextQuestion(); }, 2500);
        }

        function updateStatsUI() {
            document.getElementById('stat-a-correct').innerText = stats.A.correct;
            document.getElementById('stat-a-wrong').innerText = stats.A.wrong;
            document.getElementById('stat-b-correct').innerText = stats.B.correct;
            document.getElementById('stat-b-wrong').innerText = stats.B.wrong;
        }

        function updateTugUI() {
            document.getElementById('tug-group').style.transform = `translateX(${-pullScore * 60}px)`;
        }

        function playEffect(type) {
            const s = document.getElementById(type === 'correct' ? 'sound-correct' : 'sound-wrong');
            s.currentTime = 0; s.play();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);
            
            const winner = pullScore < 0 ? "Đội A" : "Đội B";
            saveGameResult(winner);

            alert(`TRÒ CHƠI KẾT THÚC!\nBên thắng: ${winner}\nKết quả đã được lưu.`);
            location.reload();
        }

        // LOCAL STORAGE LOGIC
        function saveGameResult(winner) {
            const history = JSON.parse(localStorage.getItem('math_tug_history') || "[]");
            const newRecord = {
                date: new Date().toLocaleString(),
                grade: document.getElementById('grade-select').value,
                topic: document.getElementById('topic-select').value,
                scoreA: `${stats.A.correct}/${stats.A.wrong}`,
                scoreB: `${stats.B.correct}/${stats.B.wrong}`,
                winner: winner
            };
            history.unshift(newRecord);
            localStorage.setItem('math_tug_history', JSON.stringify(history));
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem('math_tug_history') || "[]");
            let html = `<table><tr><th>Ngày</th><th>Lớp</th><th>Chủ đề</th><th>Đội A (Đ/S)</th><th>Đội B (Đ/S)</th><th>Thắng</th></tr>`;
            history.forEach(r => {
                html += `<tr><td>${r.date}</td><td>${r.grade}</td><td>${r.topic}</td><td>${r.scoreA}</td><td>${r.scoreB}</td><td>${r.winner}</td></tr>`;
            });
            html += `</table>`;
            document.getElementById('history-table-container').innerHTML = history.length ? html : "Chưa có dữ liệu học tập.";
            document.getElementById('history-modal').style.display = 'flex';
        }

        function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }
        function clearHistory() { if(confirm("Xóa toàn bộ lịch sử?")) { localStorage.removeItem('math_tug_history'); showHistory(); } }

        window.onload = updateTopics;
    </script>
</body>
</html>
