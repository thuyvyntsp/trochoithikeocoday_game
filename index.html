<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi kéo co dây - Pơlong dui tơlei (Ultimate Version)</title>
    <style>
        :root {
            --primary-color: #f1c40f;
            --secondary-color: #e67e22;
            --team-a-color: #3498db;
            --team-b-color: #e74c3c;
            --bg-overlay: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
            background-color: #333;
        }

        /* NỀN TRÒ CHƠI */
        .screen {
            position: absolute; width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background-image: url('bg.png'); background-size: cover; background-position: center;
        }

        #setup-screen { display: flex; }

        .container {
            background: var(--bg-overlay); padding: 20px 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 550px; width: 90%;
            text-align: center; z-index: 2; max-height: 90vh; overflow-y: auto;
        }

        .setting-group { margin: 10px 0; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        select, input, textarea {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;
        }

        .btn {
            padding: 12px 25px; font-size: 18px; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.2s; font-weight: bold; margin: 5px;
        }
        .btn-start { background: #2ecc71; color: white; width: 100%; }
        .btn-history { background: #9b59b6; color: white; width: 100%; }
        .btn-pause { background: #f39c12; color: white; padding: 5px 15px; font-size: 14px; margin-left: 10px; }

        /* BUZZ IN BUTTONS */
        .buzz-area { display: flex; gap: 20px; margin: 15px 0; justify-content: center; }
        .btn-buzz {
            width: 160px; height: 70px; font-size: 18px; border-radius: 15px;
            color: white; text-transform: uppercase; cursor: pointer; border: 4px solid rgba(255,255,255,0.3);
        }
        .buzz-a { background: var(--team-a-color); box-shadow: 0 6px #2980b9; }
        .buzz-b { background: var(--team-b-color); box-shadow: 0 6px #c0392b; }
        .btn-buzz:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .highlight-buzz { border: 5px solid yellow !important; transform: scale(1.1); }

        /* STATISTICS */
        .stats-bar {
            position: absolute; top: 10px; width: 95%; display: flex;
            justify-content: space-between; align-items: center; z-index: 20;
        }
        .stat-card {
            background: rgba(255,255,255,0.9); padding: 8px 15px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: bold; font-size: 14px;
        }

        /* GAME ELEMENTS */
        .question-box {
            background: var(--bg-overlay); padding: 20px; border-radius: 15px;
            width: 85%; max-width: 700px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center; z-index: 10; margin-top: 50px;
        }
        .rope-area { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .tug-container { position: relative; display: flex; align-items: center; justify-content: center; transition: 0.6s; width: 1000px; opacity: 1 !important; }
        .team-img { height: 260px; width: auto; opacity: 1 !important; }
        .center-mark { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: red; z-index: 4; }

        /* MODALS & OVERLAYS */
        .modal, .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; color: white;
        }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px; color: black; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <!-- OVERLAYS -->
    <div id="countdown-overlay" class="overlay" style="font-size: 150px;">3</div>
    <div id="pause-overlay" class="overlay">
        <h1>ĐÃ TẠM DỪNG</h1>
        <button class="btn btn-start" style="width: 200px;" onclick="togglePause()">TIẾP TỤC</button>
    </div>

    <!-- MÀN HÌNH CÀI ĐẶT -->
    <div id="setup-screen" class="screen">
        <div class="container">
            <h1 style="color: var(--secondary-color); margin: 0;">PƠLONG DUI TƠLEI</h1>
            
            <div class="setting-group">
                <label>Nguồn câu hỏi:</label>
                <select id="q-source" onchange="toggleQSource()">
                    <option value="ai">AI Tự tạo câu hỏi</option>
                    <option value="manual">Tự nhập danh sách</option>
                </select>
            </div>

            <div id="ai-config">
                <div class="setting-group">
                    <label>Lớp & Chủ đề:</label>
                    <select id="grade-select" onchange="updateTopics()">
                        <option value="1">Lớp 1</option><option value="2">Lớp 2</option>
                        <option value="3">Lớp 3</option><option value="4">Lớp 4</option><option value="5">Lớp 5</option>
                    </select>
                    <select id="topic-select" style="margin-top:5px;"></select>
                </div>
            </div>

            <div id="manual-settings" style="display:none;">
                <div class="setting-group">
                    <label>Nhập (Câu hỏi|Đáp án):</label>
                    <textarea id="manual-data" rows="4" placeholder="Ví dụ: 2+3|5"></textarea>
                </div>
            </div>

            <div class="setting-group">
                <label>Chế độ & Thời gian:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="play-mode" style="flex: 2;">
                        <option value="2p">2 Người (Có giành quyền)</option>
                        <option value="1p">1 Người (Đấu với Máy)</option>
                    </select>
                    <input type="number" id="time-per-question" value="15" style="flex: 1;">
                </div>
            </div>

            <button class="btn btn-start" onclick="startGame()">BẮT ĐẦU CHƠI</button>
            <button class="btn btn-history" onclick="showHistory()">XEM LỊCH SỬ LỚP HỌC</button>
        </div>
    </div>

    <!-- MÀN HÌNH CHƠI -->
    <div id="game-screen" class="screen">
        <div class="stats-bar">
            <div class="stat-card" style="color: var(--team-a-color);">Đội A: <span id="s-a-c">0</span> Đ | <span id="s-a-w">0</span> S</div>
            <div style="display: flex; align-items: center;">
                <div id="timer-display" style="font-size: 30px; font-weight: bold; background: white; padding: 5px 20px; border-radius: 20px;">15</div>
                <button class="btn btn-pause" onclick="togglePause()">Pause</button>
            </div>
            <div class="stat-card" style="color: var(--team-b-color);">Đội B: <span id="s-b-c">0</span> Đ | <span id="s-b-w">0</span> S</div>
        </div>
        
        <div class="question-box">
            <div id="turn-info" style="font-weight: bold; color: #555; margin-bottom: 5px;"></div>
            <h2 id="question-text">Câu hỏi...</h2>
            
            <div class="buzz-area" id="buzz-area">
                <button id="btn-buzz-a" class="btn-buzz buzz-a" onclick="buzzIn('A')">A GIÀNH QUYỀN</button>
                <button id="btn-buzz-b" class="btn-buzz buzz-b" onclick="buzzIn('B')">B GIÀNH QUYỀN</button>
            </div>

            <div id="answer-section" style="display: none; gap: 10px; justify-content: center; flex-direction: column;">
                <div id="answering-display" style="font-weight:bold; color: red;"></div>
                <div>
                    <input type="text" id="answer-input" placeholder="Đáp án..." style="width: 150px;" onkeyup="if(event.key==='Enter') submitAnswer()">
                    <button class="btn" style="background:#27ae60; color:white;" onclick="submitAnswer()">GỬI</button>
                </div>
            </div>
            <div id="explanation-text" style="display:none; color: #856404; background: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="rope-area">
            <div class="center-mark"></div>
            <div class="tug-container" id="tug-group">
                <img src="team.png" alt="Teams" class="team-img">
            </div>
        </div>
    </div>

    <!-- MODAL LỊCH SỬ -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Lịch Sử Lớp Học</h2>
            <div id="history-list" style="margin-bottom: 10px;"></div>
            <button class="btn" style="background: #95a5a6; color: white;" onclick="closeHistory()">ĐÓNG</button>
            <button class="btn" style="background: #e74c3c; color: white;" onclick="clearHistory()">XÓA HẾT</button>
        </div>
    </div>

    <audio id="sound-correct" src="dung.mp3"></audio>
    <audio id="sound-wrong" src="sai.mp3"></audio>
    <audio id="bg-music" src="audio.mp3" loop></audio>

    <script>
        const topicsData = {
            "1": ["Số đến 100", "Cộng/Trừ phạm vi 100"], "2": ["Bảng nhân 2, 5", "Chu vi"],
            "3": ["Bảng nhân 3-9", "Diện tích"], "4": ["Phân số", "Trung bình cộng"], "5": ["Số thập phân", "Vận tốc"]
        };

        let stats = { A: { c: 0, w: 0 }, B: { c: 0, w: 0 } };
        let questions = [], currentQIndex = 0, pullScore = 0, timer, timeLeft, gameActive = false;
        let isPaused = false, answeringTeam = null, currentTurn = 'A';

        function toggleQSource() {
            const isAI = document.getElementById('q-source').value === 'ai';
            document.getElementById('ai-config').style.display = isAI ? 'block' : 'none';
            document.getElementById('manual-settings').style.display = isAI ? 'none' : 'block';
        }

        function updateTopics() {
            const g = document.getElementById('grade-select').value;
            const ts = document.getElementById('topic-select');
            ts.innerHTML = "";
            topicsData[g].forEach(t => { let o = document.createElement('option'); o.value = t; o.innerText = t; ts.appendChild(o); });
        }

        function startGame() {
            const source = document.getElementById('q-source').value;
            if (source === 'manual') {
                const text = document.getElementById('manual-data').value.trim();
                if (!text) return alert("Chưa nhập câu hỏi!");
                const lines = text.split('\n');
                questions = [];
                for (let i = 0; i < lines.length; i++) {
                    if (!lines[i].includes('|')) return alert(`Dòng ${i+1} sai định dạng (Câu hỏi | Đáp án)`);
                    let [q, a] = lines[i].split('|');
                    questions.push({ q: q.trim(), a: a.trim() });
                }
                localStorage.setItem('math_tug_manual', text);
            } else {
                questions = []; // AI Generate Logic (Mô phỏng)
                for(let i=0; i<10; i++) { let n1 = Math.floor(Math.random()*20), n2 = Math.floor(Math.random()*20); questions.push({ q: `${n1} + ${n2} = ?`, a: (n1+n2).toString() }); }
            }

            stats = { A: { c: 0, w: 0 }, B: { c: 0, w: 0 } };
            currentQIndex = 0; pullScore = 0; updateStatsUI(); updateTugUI();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('bg-music').play();
            runCountdown();
        }

        function runCountdown() {
            const overlay = document.getElementById('countdown-overlay');
            let c = 3; overlay.style.display = 'flex'; overlay.innerText = c;
            let inter = setInterval(() => {
                c--;
                if (c > 0) overlay.innerText = c;
                else if (c === 0) overlay.innerText = "BẮT ĐẦU!";
                else { clearInterval(inter); overlay.style.display = 'none'; gameActive = true; nextQuestion(); }
            }, 1000);
        }

        function nextQuestion() {
            if (currentQIndex >= questions.length || Math.abs(pullScore) >= 5) return endGame();
            
            answeringTeam = null; isPaused = false;
            document.getElementById('explanation-text').style.display = 'none';
            document.getElementById('answer-input').value = '';
            document.getElementById('question-text').innerText = `Câu ${currentQIndex + 1}: ${questions[currentQIndex].q}`;
            
            const mode = document.getElementById('play-mode').value;
            if (mode === '2p') {
                document.getElementById('buzz-area').style.display = 'flex';
                document.getElementById('answer-section').style.display = 'none';
                document.getElementById('btn-buzz-a').disabled = false;
                document.getElementById('btn-buzz-b').disabled = false;
                document.getElementById('btn-buzz-a').classList.remove('highlight-buzz');
                document.getElementById('btn-buzz-b').classList.remove('highlight-buzz');
                document.getElementById('turn-info').innerText = "HÃY GIÀNH QUYỀN TRẢ LỜI!";
            } else {
                // Chế độ 1 người
                currentTurn = (currentQIndex % 2 === 0) ? 'A' : 'B';
                document.getElementById('buzz-area').style.display = 'none';
                document.getElementById('answer-section').style.display = 'flex';
                if (currentTurn === 'A') {
                    answeringTeam = 'A';
                    document.getElementById('answering-display').innerText = "LƯỢT CỦA BẠN";
                    document.getElementById('answer-input').disabled = false;
                    document.getElementById('answer-input').focus();
                } else {
                    document.getElementById('answering-display').innerText = "LƯỢT CỦA MÁY...";
                    document.getElementById('answer-input').disabled = true;
                    setTimeout(aiLogic, 2000);
                }
            }

            timeLeft = parseInt(document.getElementById('time-per-question').value);
            startTimer();
        }

        function aiLogic() {
            if (!gameActive || isPaused) return;
            const isCorrect = Math.random() < 0.7;
            if (isCorrect) {
                document.getElementById('answer-input').value = questions[currentQIndex].a;
                submitAnswer();
            } else handleWrong();
        }

        function buzzIn(team) {
            if (!gameActive || answeringTeam || isPaused) return;
            answeringTeam = team;
            playEffect('correct'); // Tiếng tít giành quyền
            document.getElementById('btn-buzz-' + team.toLowerCase()).classList.add('highlight-buzz');
            document.getElementById('btn-buzz-a').disabled = true;
            document.getElementById('btn-buzz-b').disabled = true;
            setTimeout(() => {
                document.getElementById('buzz-area').style.display = 'none';
                document.getElementById('answer-section').style.display = 'flex';
                document.getElementById('answering-display').innerText = `ĐỘI ${team} TRẢ LỜI!`;
                document.getElementById('answer-input').focus();
            }, 500);
        }

        function startTimer() {
            clearInterval(timer);
            document.getElementById('timer-display').innerText = timeLeft;
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = timeLeft;
                    if (timeLeft <= 0) { clearInterval(timer); handleWrong(); }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
        }

        function submitAnswer() {
            if (!gameActive || isPaused || !answeringTeam) return;
            const ans = document.getElementById('answer-input').value.trim();
            if (!ans) return;
            if (ans.toLowerCase() === questions[currentQIndex].a.toLowerCase()) handleCorrect();
            else handleWrong();
        }

        function handleCorrect() {
            clearInterval(timer); playEffect('correct');
            stats[answeringTeam].c++;
            if (answeringTeam === 'A') pullScore--; else pullScore++;
            updateStatsUI(); updateTugUI();
            setTimeout(() => { currentQIndex++; nextQuestion(); }, 1200);
        }

        function handleWrong() {
            clearInterval(timer); playEffect('wrong');
            if (answeringTeam) stats[answeringTeam].w++;
            const exp = document.getElementById('explanation-text');
            exp.innerHTML = `SAI RỒI! Đáp án: ${questions[currentQIndex].a}`;
            exp.style.display = 'block';
            updateStatsUI();
            setTimeout(() => { currentQIndex++; nextQuestion(); }, 2500);
        }

        function updateStatsUI() {
            document.getElementById('s-a-c').innerText = stats.A.c; document.getElementById('s-a-w').innerText = stats.A.w;
            document.getElementById('s-b-c').innerText = stats.B.c; document.getElementById('s-b-w').innerText = stats.B.w;
        }

        function updateTugUI() { document.getElementById('tug-group').style.transform = `translateX(${-pullScore * 60}px)`; }

        function playEffect(t) { 
            const s = document.getElementById(t === 'correct' ? 'sound-correct' : 'sound-wrong');
            s.volume = 1; s.currentTime = 0; s.play(); 
        }

        function endGame() {
            gameActive = false; clearInterval(timer);
            const winner = pullScore < 0 ? "Đội A" : "Đội B";
            const history = JSON.parse(localStorage.getItem('tug_history') || "[]");
            history.unshift({ date: new Date().toLocaleString(), winner, scoreA: `${stats.A.c}/${stats.A.w}`, scoreB: `${stats.B.c}/${stats.B.w}` });
            localStorage.setItem('tug_history', JSON.stringify(history));
            alert(`KẾT THÚC! ${winner} THẮNG!`);
            location.reload();
        }

        function showHistory() {
            const h = JSON.parse(localStorage.getItem('tug_history') || "[]");
            let html = h.length ? "<table><tr><th>Ngày</th><th>Đội A</th><th>Đội B</th><th>Thắng</th></tr>" : "Chưa có dữ liệu.";
            h.forEach(r => html += `<tr><td>${r.date}</td><td>${r.scoreA}</td><td>${r.scoreB}</td><td>${r.winner}</td></tr>`);
            document.getElementById('history-list').innerHTML = html + (h.length ? "</table>" : "");
            document.getElementById('history-modal').style.display = 'flex';
        }

        function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }
        function clearHistory() { if(confirm("Xóa hết?")) { localStorage.removeItem('tug_history'); showHistory(); } }

        window.onload = () => {
            updateTopics();
            const m = localStorage.getItem('math_tug_manual');
            if (m) document.getElementById('manual-data').value = m;
        };
    </script>
</body>
</html>
